# 檔案位置：.github/workflows/deploy.yml
name: Deploy static content to Pages

on:
  push:
    branches: ['main'] # 如果您的主要分支是 master，請改成 master

# 賦予 GitHub token 權限以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

# 💡 新增：強制 GitHub Actions 升級使用 Node 24 環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 💡 新增：升級為打包專用的 Node.js 24
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm install vite-plugin-css-injected-by-js
          npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
